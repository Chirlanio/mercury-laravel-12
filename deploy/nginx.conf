# Mercury SaaS - Nginx Configuration
# Wildcard subdomain support for multi-tenant architecture
#
# Prerequisites:
#   - Wildcard SSL certificate for *.mercury.com.br
#   - DNS wildcard: *.mercury.com.br -> server IP
#   - PHP-FPM running on socket or TCP

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name mercury.com.br *.mercury.com.br;
    return 301 https://$host$request_uri;
}

# Main HTTPS server block — handles both central and tenant domains
server {
    listen 443 ssl http2;
    server_name mercury.com.br *.mercury.com.br;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/mercury.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mercury.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Document root
    root /var/www/mercury/public;
    index index.php;

    # Max upload size
    client_max_body_size 20M;

    # Security headers (complement to Laravel SecurityHeaders middleware)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Laravel routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Deny dotfiles (except .well-known for Let's Encrypt)
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Deny access to sensitive files
    location ~* (composer\.json|composer\.lock|\.env|artisan|package\.json|webpack\.mix\.js|vite\.config\.js)$ {
        deny all;
    }

    # Health check (no logging)
    location = /up {
        access_log off;
        try_files $uri /index.php?$query_string;
    }

    # Logs
    access_log /var/log/nginx/mercury-access.log;
    error_log /var/log/nginx/mercury-error.log;
}
